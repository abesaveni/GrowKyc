name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Growkyc_backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: kyc_user
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: kyc_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kyc_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://kyc_user:ci_password@localhost:5432/kyc_db
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-not-for-production-0123456789abcdef
      ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: Growkyc_backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run verified test suites
        # Auth + Didit are the suites validated during the hardening/integration
        # work. The equifax_* suites hit live endpoints and are excluded from CI.
        # TODO: expand to the full suite after the pre-existing-failure triage.
        run: pytest tests/test_auth.py tests/test_didit.py -q --disable-warnings

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Growkyc-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Growkyc-main/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
