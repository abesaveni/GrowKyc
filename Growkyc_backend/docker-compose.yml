# Secrets are loaded from a .env file (git-ignored) — NEVER hardcode credentials here.
# Copy .env.example to .env and fill in real values before running.
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: kyc_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kyc_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: ${POSTGRES_DB:-kyc_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kyc_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kyc_network
    restart: unless-stopped

  # KYC Backend API
  kyc_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kyc_api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kyc_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kyc_db}
      ENV: production
      HOST: 0.0.0.0
      PORT: 8000
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kyc_network
    restart: unless-stopped
    command: gunicorn -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 main:app

  # Redis Broker
  redis:
    image: redis:7-alpine
    container_name: kyc_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kyc_network
    restart: unless-stopped

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kyc_celery_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kyc_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kyc_db}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kyc_network
    restart: unless-stopped
    command: celery -A core.celery_app.celery_app worker --loglevel=info

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kyc_celery_beat
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kyc_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-kyc_db}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - kyc_network
    restart: unless-stopped
    command: celery -A core.celery_app.celery_app beat --loglevel=info

volumes:
  postgres_data:

networks:
  kyc_network:
    driver: bridge
