[pytest]
# Pytest configuration for KYC tests

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Add options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers
markers =
    auth: Authentication tests
    kyc: KYC submission and management tests
    admin: Admin operations tests
    integration: Integration tests

# Coverage options
[coverage:run]
source = .
omit = 
    */tests/*
    */venv/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
