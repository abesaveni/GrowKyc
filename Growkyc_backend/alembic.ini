# alembic.ini
# ============
# Alembic configuration for GrowKYC backend modular migrations.
#
# Usage:
#   alembic revision --autogenerate -m "description"
#   alembic upgrade head
#   alembic downgrade -1
#   alembic history --verbose
#
# The script_location points to the existing migrations/ directory.

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
# Default: %%(rev)s_%%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file_template timestamps
timezone = UTC

# Max length of slug in generated migration filenames
truncate_slug_length = 40

# Set to 'true' to run the environment during autogenerate
# operations — useful when using external process managers
prepend_sys_path = .

# Version locations (single directory)
version_locations = %(here)s/migrations/versions

# The output encoding for generated migration files
output_encoding = utf-8

# Database URL — read from environment variable at runtime (see env.py)
# Do NOT hardcode credentials here. env.py reads DATABASE_URL from .env
sqlalchemy.url = sqlite:///./kyc.db


# ---- Logging configuration ----
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
